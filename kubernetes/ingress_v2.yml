apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vitubot-v2
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    cert-manager.io/revision-history-limit: "3"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: default-redirect-https@kubernetescrd,default-vitubot-stripprefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - host: vitu.pscp-css.support
    http:
      paths:
      - path: /vitubot
        pathType: Prefix
        backend:
          service:
            name: vitubot
            port:
              number: 8000
  tls:
    - hosts:
      - vitu.pscp-css.support
      secretName: vitu.pscp-css.support